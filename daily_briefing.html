<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>每日十大观点</title>
  <script src="./assets/metrics.js" defer></script>
  <script src="./assets/expert-limit.js" defer></script>
  <style>
    :root {
      --bg: #09101f;
      --card: rgba(17, 27, 52, 0.94);
      --line: rgba(255,255,255,0.12);
      --text: #edf3ff;
      --muted: #94a9d5;
      --brand: #6ad3ff;
      --brand-2: #1e73ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 0%, rgba(43, 84, 181, 0.44), transparent 30%),
        linear-gradient(180deg, #09101f 0%, #0b1328 100%);
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .topbar {
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
      padding:12px 14px; border:1px solid var(--line); border-radius:16px;
      background: rgba(8,16,31,0.72); backdrop-filter: blur(16px); position:sticky; top:12px; z-index:10;
    }
    .brand { font-size:18px; font-weight:800; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:9px 13px; border-radius:11px; border:1px solid rgba(125,177,255,0.42);
      background: linear-gradient(135deg, #183a7a, #122c5a); color: var(--text); text-decoration:none; cursor:pointer; font-size:13px;
    }
    .btn.main { background: linear-gradient(135deg, #2ca7ff, #1f6dff); border-color: rgba(113,208,255,0.82); }
    .btn.ghost { background: rgba(255,255,255,0.04); }
    .hero, .panel, .card, .cta-panel { border:1px solid var(--line); border-radius:18px; background: var(--card); }
    .hero {
      margin-top:14px; padding:22px;
      background: radial-gradient(circle at 100% 0%, rgba(106,211,255,0.12), transparent 28%), linear-gradient(180deg, rgba(16,26,51,0.94), rgba(10,16,32,0.96));
    }
    h1 { margin:0; font-size:36px; line-height:1.08; }
    .sub { margin-top:10px; color:var(--muted); font-size:15px; line-height:1.7; max-width:860px; }
    .hero-row, .hero-cta, .card-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .badge {
      padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color:#d9e5ff; font-size:12px;
    }
    .panel { margin-top:14px; padding:16px; }
    .section-head { display:flex; justify-content:space-between; gap:12px; align-items:end; flex-wrap:wrap; }
    .section-head h2 { margin:0; font-size:22px; }
    .section-copy { color:var(--muted); font-size:13px; line-height:1.7; max-width:760px; }
    .grid { margin-top:14px; display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:12px; }
    .card { position:relative; padding:16px; }
    .rank { font-size:13px; color:#d9e8ff; font-weight:700; }
    .handle { color:var(--muted); font-size:13px; }
    .meta { margin-top:8px; color:var(--muted); font-size:12px; line-height:1.6; }
    .quote {
      margin-top:14px; padding:14px; min-height:132px; border-radius:14px; line-height:1.7;
      border:1px solid rgba(106,211,255,0.2); background: rgba(106,211,255,0.07);
    }
    .time-line { margin-top:10px; color:var(--muted); font-size:12px; }
    .share { position:absolute; right:14px; top:14px; }
    .share summary {
      list-style:none; cursor:pointer; width:34px; height:34px; border-radius:999px;
      display:flex; align-items:center; justify-content:center; border:1px solid rgba(125,177,255,0.42);
      background:#16366d; color:#eef5ff; font-size:14px;
    }
    .share summary::-webkit-details-marker { display:none; }
    .share-menu {
      position:absolute; right:0; top:40px; display:flex; flex-direction:column; gap:6px;
      min-width:150px; padding:8px; border-radius:12px; border:1px solid rgba(255,255,255,0.14);
      background:#0f1933; z-index:20;
    }
    .share-menu button {
      cursor:pointer; text-align:left; border:1px solid rgba(125,177,255,0.42);
      border-radius:8px; background:#17396f; color:#eef5ff; padding:7px 9px; font-size:12px;
    }
    .share-menu button:hover { background:#1f4686; }
    .cta-panel {
      margin-top:18px; padding:18px;
      background: radial-gradient(circle at 100% 0%, rgba(106,211,255,0.1), transparent 26%), linear-gradient(180deg, rgba(15,27,55,0.96), rgba(9,17,33,0.96));
    }
    .cta-panel h2 { margin:0; font-size:24px; }
    .cta-panel p { margin:10px 0 0; color:var(--muted); line-height:1.7; }
    .empty { padding:18px; border-radius:16px; border:1px dashed rgba(255,255,255,0.14); color:var(--muted); line-height:1.7; }
    @media (max-width: 980px) { .grid { grid-template-columns:1fr; } h1 { font-size:30px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">AI Influence Intelligence</div>
      <div class="actions">
        <a class="btn ghost" href="./index.html" data-zh="首页" data-en="Home">首页</a>
        <a class="btn ghost" href="./insights.html" data-zh="最新分享" data-en="Latest Shares">最新分享</a>
        <a class="btn ghost" href="./daily_progress.html" data-zh="每日进展" data-en="Daily Progress">每日进展</a>
        <a class="btn ghost" href="./profiles/index.html" data-zh="人物库" data-en="Profiles">人物库</a>
        <a class="btn ghost" href="./commercial.html" data-zh="商业方案" data-en="Commercial">商业方案</a>
        <a class="btn ghost" href="./contact.html?source=briefing&intent=demo" data-zh="联系" data-en="Contact">联系</a>
        <a class="btn" href="#" id="langBtn">EN</a>
      </div>
    </div>

    <section class="hero">
      <h1 data-zh="Top10：把当前最值得传播的内容集中看完" data-en="Top10: review the most distributable ideas in one place">Top10：把当前最值得传播的内容集中看完</h1>
      <p class="sub" data-zh="这页适合做对外栏目、品牌海报、行业速览和社媒素材。每张卡片都保留人物入口、X 原链接和分享动作，方便你直接转成内容资产。" data-en="This page is built for editorial columns, branded posters, industry briefings, and social distribution. Every card keeps the profile entry, X link, and share actions so it can move straight into content production.">这页适合做对外栏目、品牌海报、行业速览和社媒素材。每张卡片都保留人物入口、X 原链接和分享动作，方便你直接转成内容资产。</p>
      <div class="hero-row">
        <span class="badge" id="scopeBadge">当前样本：Top10</span>
        <span class="badge" id="updatedBadge">内容时间：-</span>
        <span class="badge" data-zh="默认按最新热度与影响力生成" data-en="Built from the freshest high-heat content available">默认按最新热度与影响力生成</span>
      </div>
      <div class="hero-cta">
        <a class="btn main" href="./poster.html?mode=top10" data-zh="导出整合海报" data-en="Export Top10 Poster">导出整合海报</a>
        <a class="btn" href="./poster.html?mode=custom" data-zh="自选博主海报" data-en="Custom Poster">自选博主海报</a>
        <a class="btn" href="./contact.html?source=briefing&intent=distribution" data-zh="咨询品牌版" data-en="Ask About Brand Version">咨询品牌版</a>
      </div>
    </section>

    <section class="panel" id="freshness"></section>
    <section id="grid" class="grid"></section>

    <section class="cta-panel">
      <h2 data-zh="想把 Top10 直接变成品牌栏目？" data-en="Want to turn Top10 into a branded recurring format?">想把 Top10 直接变成品牌栏目？</h2>
      <p data-zh="如果你的团队已经需要稳定输出长图、海报、栏目或周报，这一页就已经具备首版商用价值。接下来只需要补品牌模板和团队交付。" data-en="If your team already needs recurring long-form assets, posters, editorial columns, or weekly briefings, this page is already commercially useful. The next step is branded templates and team delivery.">如果你的团队已经需要稳定输出长图、海报、栏目或周报，这一页就已经具备首版商用价值。接下来只需要补品牌模板和团队交付。</p>
      <div class="hero-cta">
        <a class="btn main" href="./commercial.html" data-zh="查看商业套餐" data-en="View Commercial Plans">查看商业套餐</a>
        <a class="btn" href="./contact.html?source=briefing&intent=proposal" data-zh="生成商务简报" data-en="Generate Proposal Brief">生成商务简报</a>
      </div>
    </section>
  </div>

  <script>
    const langKey = "xai_lang";
    let uiLang = localStorage.getItem(langKey) || "zh";
    let rows = [];
    let pageData = { updated_at: "", built_at: "" };

    function closeShareMenus(except) {
      document.querySelectorAll('.share[open]').forEach((el) => { if (el !== except) el.removeAttribute('open'); });
    }
    document.addEventListener('click', (e) => { if (!e.target.closest('.share')) closeShareMenus(null); });

    function applyLang() {
      document.documentElement.lang = uiLang === 'zh' ? 'zh-CN' : 'en';
      document.title = uiLang === 'zh' ? '每日十大观点' : 'Top10 Daily Briefing';
      document.querySelectorAll('[data-zh]').forEach((el) => {
        el.textContent = el.getAttribute(uiLang === 'zh' ? 'data-zh' : 'data-en');
      });
      document.getElementById('langBtn').textContent = uiLang === 'zh' ? 'EN' : '中文';
      renderFreshness();
      renderCards();
    }

    function renderFreshness() {
      const contentAt = (pageData.updated_at || '-').replace('T', ' ').slice(0, 19);
      const builtAt = (pageData.built_at || '-').replace('T', ' ').slice(0, 19);
      const todayCount = rows.filter((r) => Boolean(r.has_today_tweet)).length;
      let noteZh = '当前样本里暂未确认到当天可验证分享，页面已回退到最近一次可验证内容，并保留时间标注。';
      let noteEn = 'No same-day verifiable post could be confirmed in the current sample, so the page falls back to the latest verifiable shares and keeps their timestamps visible.';
      if (todayCount === rows.length && rows.length) {
        noteZh = '当前列表展示的是今天热度最高的可验证内容。';
        noteEn = 'This list shows the highest-heat verifiable content from today.';
      } else if (todayCount > 0) {
        noteZh = `当前列表优先展示今天热度最高的可验证内容；其中 ${todayCount}/${rows.length} 位有当天可验证分享，其余回退到最近一次可验证内容并保留时间标注。`;
        noteEn = `This list prioritizes the highest-heat verifiable content from today; ${todayCount}/${rows.length} entries have same-day verified shares, while the rest fall back to the latest verifiable content with timestamps shown.`;
      }
      document.getElementById('scopeBadge').textContent = uiLang === 'zh' ? `当前展示：Top${rows.length || 0}` : `Current set: Top${rows.length || 0}`;
      document.getElementById('updatedBadge').textContent = uiLang === 'zh' ? `内容时间：${contentAt}` : `Content time: ${contentAt}`;
      document.getElementById('freshness').innerHTML = `
        <div class="section-head">
          <div>
            <h2>${uiLang === 'zh' ? '内容说明' : 'Content note'}</h2>
            <div class="section-copy">${uiLang === 'zh'
              ? `内容时间 ${contentAt} · 页面生成 ${builtAt}。${noteZh}`
              : `Content time ${contentAt} · page built ${builtAt}. ${noteEn}`}</div>
          </div>
        </div>`;
    }

    function shareLabels() {
      return uiLang === 'zh'
        ? { poster: '下载海报', copy: '复制链接', native: '系统分享', profile: '查看人物页', openX: '打开 X', copied: '已复制链接', unsupported: '当前浏览器不支持系统分享，已复制链接', failed: '分享失败，请重试', latest: '最新分享：', time: '分享时间：' }
        : { poster: 'Download poster', copy: 'Copy link', native: 'Share', profile: 'View Profile', openX: 'Open X', copied: 'Link copied', unsupported: 'Native share is not available. The link was copied instead.', failed: 'Share failed. Please try again.', latest: 'Latest share: ', time: 'Share time: ' };
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value);
        alert(shareLabels().copied);
      } catch {
        window.prompt(uiLang === 'zh' ? '复制以下链接：' : 'Copy this link:', value);
      }
    }

    function renderCards() {
      const grid = document.getElementById('grid');
      if (!rows.length) {
        grid.innerHTML = `<div class="empty">${uiLang === 'zh'
          ? '当前样本里暂时没有可展示内容。系统会优先展示当日热度最高的分享；如果没有当日内容，则回退到最近一次可用内容。'
          : 'There is no displayable content in the current sample yet. The system prioritizes the hottest same-day share and falls back to the latest usable share when needed.'}</div>`;
        return;
      }
      const labels = shareLabels();
      grid.innerHTML = rows.map((r, i) => {
        const share = uiLang === 'zh'
          ? (r.latest_share_zh || r.latest_viewpoint_zh || r.daily_essence_zh || '')
          : (r.latest_share_en || r.latest_viewpoint_en || r.daily_essence_en || '');
        const shareUrl = r.today_hottest_tweet_url || r.latest_tweet_url || `https://x.com/${r.handle}`;
        const shareTime = r.latest_tweet_at_label || (r.latest_tweet_at || '').replace('T', ' ').slice(0, 16) || '-';
        return `
          <article class="card">
            <details class="share">
              <summary title="share">↗</summary>
              <div class="share-menu">
                <button data-action="poster" data-slug="${r.slug}">${labels.poster}</button>
                <button data-action="copy" data-url="${shareUrl}">${labels.copy}</button>
                <button data-action="native" data-url="${shareUrl}" data-title="${r.name}">${labels.native}</button>
              </div>
            </details>
            <div class="rank">#${i + 1}</div>
            <div style="margin-top:6px"><b>${r.name}</b> <span class="handle">@${r.handle}</span></div>
            <div class="meta">${Number(r.score || 0).toFixed(3)} · ${(r.topics || []).join(' · ')}</div>
            <div class="quote">${labels.latest}${share || (uiLang === 'zh' ? '暂无可用内容' : 'No share available')}</div>
            <div class="time-line">${labels.time}${shareTime}</div>
            <div class="card-actions">
              <a class="btn" href="./profiles/${r.slug}.html">${labels.profile}</a>
              <a class="btn ghost" href="${shareUrl}" target="_blank" rel="noreferrer">${labels.openX}</a>
            </div>
          </article>`;
      }).join('');

      document.querySelectorAll('.share').forEach((el) => {
        el.addEventListener('toggle', () => { if (el.open) closeShareMenus(el); });
      });
      document.querySelectorAll('.share-menu button').forEach((btn) => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          const cardShare = btn.closest('.share');
          const labels = shareLabels();
          try {
            if (btn.dataset.action === 'poster') {
              location.href = `./poster.html?slug=${encodeURIComponent(btn.dataset.slug || '')}&mode=briefing&lang=${uiLang}`;
              return;
            }
            if (btn.dataset.action === 'copy') {
              await copyText(btn.dataset.url || location.href);
              return;
            }
            if (btn.dataset.action === 'native') {
              const url = btn.dataset.url || location.href;
              const title = btn.dataset.title || 'Top10';
              if (navigator.share) {
                await navigator.share({ title, url });
              } else {
                await copyText(url);
                alert(labels.unsupported);
              }
            }
          } catch {
            alert(labels.failed);
          } finally {
            if (cardShare) cardShare.removeAttribute('open');
          }
        });
      });
    }

    async function boot() {
      const limit = window.XAIExpertLimit ? window.XAIExpertLimit.getLimit(300) : 300;
      const data = await fetch('./data/daily_briefing.json').then((r) => r.json()).catch(() => ({ items: [] }));
      pageData = data || { items: [] };
      rows = (data.items || []).slice(0, Math.min(10, limit));
      applyLang();
    }

    document.getElementById('langBtn').addEventListener('click', (e) => {
      e.preventDefault();
      uiLang = uiLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem(langKey, uiLang);
      applyLang();
    });

    boot();
  </script>
  <script src="./assets/share-fab.js" defer></script>
</body>
</html>
