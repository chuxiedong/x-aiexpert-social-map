name: Daily Data Refresh

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh graph and ranking
        run: |
          python3 scripts/update_mitbunny_graph.py
          python3 scripts/update_experts.py --limit 300 --manual data/manual_experts.json

      - name: Refresh engagement metrics (optional)
        if: ${{ secrets.X_BEARER_TOKEN != '' }}
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python3 scripts/update_engagement_metrics.py --limit 300 --tweets-per-user 30
          python3 scripts/update_mitbunny_graph.py

      - name: Regenerate pages and heartbeat
        run: |
          python3 scripts/generate_content_pages.py
          python3 scripts/heartbeat.py

      - name: Validate data integrity
        run: |
          python3 scripts/validate_data_integrity.py

      - name: Commit and push (only when changed)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(data): daily refresh $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes detected, skip commit."
          fi
